# Run from inside container: docker exec -w /repo dbt_cli pre-commit run --all-files
# dbt hooks only run when files under dbt_project/ are modified

repos:
  - repo: local
    hooks:
      - id: dbt-seed
        name: dbt seed
        entry: bash -c 'dbt seed --profiles-dir /usr/app/dbt --project-dir /usr/app/dbt'
        language: system
        pass_filenames: false
        files: ^dbt_project/
      - id: dbt-run
        name: dbt run (modified + downstream)
        entry: bash /repo/scripts/dbt-run-modified.sh
        language: system
        pass_filenames: false
        files: ^dbt_project/
      - id: dbt-test
        name: dbt test (modified + downstream)
        entry: bash /repo/scripts/dbt-test-modified.sh
        language: system
        pass_filenames: false
        files: ^dbt_project/
      - id: dbt-coverage
        name: dbt-coverage (full lineage has ≥1 test)
        entry: bash /repo/scripts/dbt-coverage.sh
        language: system
        pass_filenames: false
        files: ^dbt_project/
      - id: dbt-drop-stale-relations
        name: dbt drop stale relations (execute)
        entry: bash -c 'dbt run-operation drop_stale_relations --args "$0" --profiles-dir /usr/app/dbt --project-dir /usr/app/dbt'
        args: ['{"schema_name": "public", "dry_run": false}']
        language: system
        pass_filenames: false
        files: ^dbt_project/
        verbose: true